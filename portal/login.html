* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  gap: 24px;
}
.container { max-width: 420px; width: 100%; }
.header { text-align: center; margin-bottom: 32px; }
.logo { font-size: 48px; margin-bottom: 12px; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.subtitle { font-size: 14px; color: var(--text-muted); }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
}
.form-group { margin-bottom: 20px; }
label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 14px;
  color: var(--text);
  transition: all .2s ease;
}
input:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.08); }
input::placeholder { color: var(--text-muted); }
.btn {
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s ease;
  margin-top: 8px;
}
.btn:hover { background: #16a34a; transform: scale(1.02); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
.alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
.alert.warning { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); color: #fbbf24; }
.links { display: flex; justify-content: space-between; margin-top: 20px; font-size: 14px; }
.links a { color: var(--text-muted); text-decoration: none; transition: color .2s; }
.links a:hover { color: var(--accent); }
.divider { text-align: center; margin: 24px 0; color: var(--text-muted); font-size: 13px; }
.back-link { text-align: center; margin-top: 20px; }
.back-link a { color: var(--text-muted); text-decoration: none; font-size: 14px; transition: color .2s; }
.back-link a:hover { color: var(--accent); }

<script>
/* ── NasTheme inline ── */
(function(){
  const KEY='dashboard-tema';
  function aplicar(t){
    if(t==='light'){document.documentElement.classList.add('light-theme');if(document.body)document.body.classList.add('light-theme');}
    else{document.documentElement.classList.remove('light-theme');if(document.body)document.body.classList.remove('light-theme');}
    var ic=document.getElementById('themeIcon');if(ic)ic.textContent=t==='dark'?'🌙':'☀️';
  }
  function get(){return localStorage.getItem(KEY)||'dark';}
  aplicar(get());
  window.NasTheme={
    carregar:function(){aplicar(get());},
    toggle:function(){
      var n=get()==='dark'?'light':'dark';
      localStorage.setItem(KEY,n);aplicar(n);
      var ic=document.getElementById('themeIcon');
      if(ic){ic.style.transform='rotate(360deg) scale(0)';setTimeout(function(){ic.textContent=n==='dark'?'🌙':'☀️';ic.style.transform='rotate(0deg) scale(1)';},150);}
    },
    getTema:get
  };
  document.addEventListener('DOMContentLoaded',function(){aplicar(get());});
})();
</script>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>
function toggleMesas() {
  const btn = document.getElementById('mesasToggle');
  const panel = document.getElementById('mesasPanel');
  btn.classList.toggle('open');
  panel.classList.toggle('open');
}

// Aguarda Supabase estar pronto
document.addEventListener('supabase-ready', inicializar);
// fallback se já carregou
if (window._supabase) inicializar();

function inicializar() {
  const sb = window._supabase;

  // ── Verifica sessão ativa ──
  document.body.style.opacity = '0.5';
  document.body.style.pointerEvents = 'none';

  sb.auth.getSession().then(async ({ data: { session } }) => {
    if (session) {
      const origem = window.location.hash.includes('access_token') ? 'google' : 'login';
      await avaliarSessao(session, origem);
      if (origem === 'google' && window.location.hash) {
        history.replaceState(null, '', window.location.pathname);
      }
      document.body.style.opacity = '1';
      document.body.style.pointerEvents = 'auto';
      return;

      const user = session.user;
      try {
        const { data: userData } = await sb.from('users').select('role, aprovado').eq('id', user.id).single();
        if (userData) {
          if (userData.role === 'admin') { window.location.href = 'admin.html'; return; }
          if (userData.aprovado === true) { window.location.href = 'aluno.html'; return; }
        }
        await sb.auth.signOut();
      } catch (err) { console.error('Erro ao verificar usuário:', err); }
    }
    document.body.style.opacity = '1';
    document.body.style.pointerEvents = 'auto';
  });

  const form     = document.getElementById('loginForm');
  const alertBox = document.getElementById('alert');
  const btnLogin = document.getElementById('btnLogin');

  function mostrarAlerta(mensagem, tipo) {
    alertBox.textContent = mensagem;
    alertBox.className = `alert ${tipo}`;
    alertBox.style.display = 'block';
  }

  async function avaliarSessao(session, origem) {
    const user = session?.user;
    if (!user) return false;

    try {
      let { data: userData, error } = await sb.from('users').select('role, aprovado').eq('id', user.id).single();
      if (error && error.code !== 'PGRST116') throw error;

      if (!userData) {
        const { error: upsertError } = await sb.from('users').upsert({
          id: user.id,
          nome: user.user_metadata?.full_name || user.email?.split('@')[0] || 'Aluno',
          email: user.email,
          role: 'aluno',
          aprovado: false,
          created_at: new Date().toISOString()
        });
        if (upsertError) throw upsertError;
        userData = { role: 'aluno', aprovado: false };
      }

      if (userData.role === 'admin') {
        window.location.href = 'admin.html';
        return true;
      }

      if (userData.aprovado === true) {
        window.location.href = 'aluno.html';
        return true;
      }

      if (origem === 'google') {
        window.location.href = 'cadastro.html?google=1';
        return true;
      }

      mostrarAlerta(
        origem === 'google'
          ? '⏳ Login com Google concluído. Sua conta ainda está aguardando aprovação do administrador.'
          : '⏳ Sua conta ainda está aguardando aprovação do administrador.',
        'warning'
      );
      await sb.auth.signOut();
      return true;
    } catch (err) {
      console.error('Erro ao verificar usuário:', err);
      mostrarAlerta('❌ Não foi possível validar sua conta agora. Tente novamente.', 'error');
      try { await sb.auth.signOut(); } catch (_) {}
      return true;
    }
  }

  // ── Login com email + senha ──
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    btnLogin.disabled = true;
    btnLogin.textContent = 'Entrando...';
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
      if (error) throw error;

      await avaliarSessao(data.session, 'login');
      btnLogin.disabled = false;
      btnLogin.textContent = 'Entrar';
      return;

      const user = data.user;
      // Garante row em users (cria se não existir via upsert)
      const { data: userData } = await sb.from('users').select('role, aprovado').eq('id', user.id).single();

      if (!userData) {
        // Primeiro acesso — trigger já cria a row, mas garante aprovado=false
        await sb.from('users').upsert({
          id: user.id,
          nome: user.user_metadata?.full_name || email.split('@')[0],
          email: user.email,
          role: 'aluno',
          aprovado: false,
          created_at: new Date().toISOString()
        });
        mostrarAlerta('⏳ Conta criada. Aguarde aprovação do administrador.', 'warning');
        await sb.auth.signOut();
        btnLogin.disabled = false; btnLogin.textContent = 'Entrar'; return;
      }

      if (userData.role === 'admin') { window.location.href = 'admin.html'; return; }
      if (userData.aprovado !== true) {
        mostrarAlerta('⏳ Sua conta ainda está aguardando aprovação do administrador.', 'warning');
        await sb.auth.signOut();
        btnLogin.disabled = false; btnLogin.textContent = 'Entrar'; return;
      }
      window.location.href = 'aluno.html';

    } catch (error) {
      let mensagem = '❌ ';
      const msg = error.message || '';
      if (msg.includes('Invalid login credentials') || msg.includes('invalid_credentials')) {
        mensagem += 'E-mail ou senha incorretos.';
      } else if (msg.includes('Email not confirmed')) {
        mensagem += 'Confirme seu e-mail antes de entrar.';
      } else if (msg.includes('Too many requests')) {
        mensagem += 'Muitas tentativas. Tente novamente mais tarde.';
      } else {
        mensagem += msg;
      }
      mostrarAlerta(mensagem, 'error');
      btnLogin.disabled = false; btnLogin.textContent = 'Entrar';
    }
  });

  // ── Login com Google ──
  const btnGoogle = document.getElementById('btnGoogle');
  if (btnGoogle) {
    btnGoogle.addEventListener('click', async () => {
      mostrarAlerta('🔄 Redirecionando para o Google...', 'warning');
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + window.location.pathname }
      });
      if (error) mostrarAlerta('❌ Erro ao entrar com Google: ' + error.message, 'error');
    });
  }

  // ── Esqueceu senha ──
  document.getElementById('esqueceuSenha').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) { mostrarAlerta('❌ Digite seu e-mail primeiro', 'error'); return; }
    try {
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/portal/reset-password.html'
      });
      if (error) throw error;
      mostrarAlerta('✅ E-mail de recuperação enviado! Verifique sua caixa de entrada.', 'warning');
    } catch (error) {
      mostrarAlerta('❌ Erro ao enviar e-mail de recuperação: ' + error.message, 'error');
    }
  });
}
</script>
